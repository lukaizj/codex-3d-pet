name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test

  desktop-build:
    strategy:
      matrix:
        include:
          - runner: windows-latest
            args: ''
          - runner: macos-14
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.31.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @codex-3d-pet/protocol build
      - run: pnpm --filter @codex-3d-pet/desktop tauri build ${{ matrix.args }}
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.runner == 'windows-latest' && 'windows-setup-exe' || 'macos-dmg' }}
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/**/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
